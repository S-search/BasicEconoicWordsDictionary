<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Economic Vocabulary Dictionary</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f6f5f1;
      --panel: #ffffff;
      --ink: #172326;
      --muted: #68716e;
      --line: #d8d5cc;
      --accent: #2f6f62;
      --accent-soft: #e4f0eb;
      --warn: #9c5a2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", Meiryo, system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    .site-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf6;
    }
    .brand {
      min-width: 0;
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .site-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
    }
    .site-copy {
      margin: 6px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .header-stats {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      min-width: 96px;
    }
    .stat strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
    }
    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .app {
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr);
      min-height: calc(100vh - 105px);
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
