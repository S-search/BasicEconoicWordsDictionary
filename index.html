<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Economic Vocabulary Dictionary</title>
  <style>
    :root {
      color-scheme: dark;
      --paper: #050608;
      --panel: #0b0d10;
      --panel-2: #11151b;
      --ink: #f5f7fa;
      --muted: #9ba5b2;
      --line: #242a33;
      --accent: #68d8c1;
      --accent-2: #8eb7ff;
      --accent-soft: #142722;
      --warn: #ffb06b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", Meiryo, system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    .site-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #07090d;
      box-shadow: 0 1px 0 rgba(255,255,255,0.02), 0 18px 48px rgba(0,0,0,0.28);
    }
    .brand {
      min-width: 0;
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .site-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
    }
    .site-copy {
      margin: 6px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .header-stats {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 8px 10px;
      min-width: 96px;
    }
    .stat strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
    }
    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .app {
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr);
      min-height: calc(100vh - 105px);
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .count {
      margin: 5px 0 14px;
      color: var(--muted);
      font-size: 13px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid #b7b3aa;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 15px;
      background: #090b0f;
      color: var(--ink);
      outline: none;
    }
    input::placeholder {
      color: #6f7884;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(104,216,193,0.16);
    }
    .letters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0 14px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0d1015;
      color: var(--ink);
      min-width: 38px;
      height: 32px;
      padding: 0 10px;
      font: inherit;
      cursor: pointer;
    }
    button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #d9fff7;
      font-weight: 700;
    }
    button:hover {
      border-color: #3a4654;
      background: #151a21;
    }
    .list {
      overflow: auto;
      min-height: 0;
      border-top: 1px solid var(--line);
    }
    .item {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      display: block;
      text-align: left;
      padding: 8px 9px;
      background: transparent;
    }
    .item.active {
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .term {
      display: block;
      font-weight: 700;
      font-size: 15px;
    }
    .translation {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    main {
      padding: 34px 40px;
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 26px;
    }
    .head {
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
    }
    .head h2 {
      margin: 0;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .head p {
      margin: 9px 0 0;
      color: var(--accent);
      font-size: 23px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .label {
      margin-bottom: 8px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .example {
      margin: 0;
      font-size: 20px;
      line-height: 1.65;
    }
    .example.ja {
      font-size: 18px;
      color: #d9dee7;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .position {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }
    .empty {
      color: var(--warn);
      padding: 20px 0;
    }
    @media (max-width: 780px) {
      .site-header { grid-template-columns: 1fr; padding: 16px 18px; }
      .header-stats { justify-content: flex-start; }
      .app { grid-template-columns: 1fr; }
      aside { min-height: 45vh; border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 24px 20px; }
      .head h2 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <header class="site-header">

        <button id="prev" type="button">前へ</button>
        <button id="next" type="button">次へ</button>
        <span id="position" class="position"></span>
      </div>
    </main>
  </div>
  <script>
    const entries = [{"id": 1, "term": "Accounting", "translation": "会計", "example": "The country's accounting has shown significant improvement over the past fiscal year.", "exampleJa": "その国の会計は、前会計年度において大幅な改善を示した。", "letter": "A"}, {"id": 2, "term": "Acquisition", "translation": "買収", "example": "Analysts are closely monitoring the fluctuations in acquisition amid global economic uncertainty.", "exampleJa": "世界経済の不確実性の中で、アナリストは買収の変動を注意深く監視している。", "letter": "A"}, {"id": 3, "term": "Actual Asset", "translation": "実際の資産", "example": "The government announced a new strategy to address the challenges related to actual asset.", "exampleJa": "政府は、実際の資産に関連する課題に対処するための新しい戦略を発表した。", "letter": "A"}, {"id": 4, "term": "Actual Budget", "translation": "実際の予算", "example": "The central bank decided to adjust its policies to stabilize the nationwide actual budget.", "exampleJa": "中央銀行は、全国的な実際の予算を安定させるために政策を調整することを決定した。", "letter": "A"}, {"id": 5, "term": "Actual Cash Flow", "translation": "実際のキャッシュフロー", "example": "Changes in actual cash flow can have a direct and profound impact on consumer confidence.", "exampleJa": "実際のキャッシュフローの変化は、消費者マインドに直接的かつ深刻な影響を与える可能性がある。", "letter": "A"}, {"id": 6, "term": "Actual Earnings", "translation": "実際の利益", "example": "The corporate financial statement highlighted an unexpected variance in their actual earnings.", "exampleJa": "企業の財務諸表は、彼らの実際の利益における予期せぬ変動を強調した。", "letter": "A"}, {"id": 7, "term": "Actual Equity", "translation": "実際の自己資本", "example": "International trade negotiations often focus heavily on regulations governing actual equity.", "exampleJa": "国際貿易交渉では、しばしば実際の自己資本を管理する規制に大きな焦点が当てられる。", "letter": "A"}, {"id": 8, "term": "Actual Expenditure", "translation": "実際の支出", "example": "The multinational firm seeks to mitigate risks by diversifying its actual expenditure.", "exampleJa": "その多国籍企業は、実際の支出を多様化することでリスクを軽減しようとしている。", "letter": "A"}, {"id": 9, "term": "Actual Income", "translation": "実際の所得", "example": "A sudden rise in actual income could lead to tighter credit conditions across the market.", "exampleJa": "実際の所得の急激な上昇は、市場全体の信用状況の引き締めにつながる可能性がある。", "letter": "A"}, {"id": 10, "term": "Actual Liability", "translation": "実際の負債", "example": "The economic research institute published a comprehensive report on the trends of actual liability.", "exampleJa": "その経済研究所は、実際の負債の動向に関する包括的な報告書を発行した。", "letter": "A"}, {"id": 11, "term": "Actual Loss", "translation": "実際の損失", "example": "Many emerging markets are experiencing rapid shifts in their actual loss structures.", "exampleJa": "多くの新興国市場は、その実際の損失構造において急速な変化を経験している。", "letter": "A"}, {"id": 12, "term": "Actual Margin", "translation": "実際のマージン", "example": "The CFO emphasized that maintaining a healthy actual margin is vital for long-term sustainability.", "exampleJa": "CFOは、長期的な持続可能性のために健全な実際のマージンを維持することが不可欠であると強調した。", "letter": "A"}, {"id": 13, "term": "Actual Profit", "translation": "実際の利益", "example": "Experts debate whether the current level of actual profit is sustainable in the long run.", "exampleJa": "専門家は、現在の実際の利益の水準が長期的に維持可能かどうかについて議論している。", "letter": "A"}, {"id": 14, "term": "Actual Revenue", "translation": "実際の収益", "example": "The newly proposed legislation aims to reduce barriers and foster growth in actual revenue.", "exampleJa": "新しく提案された法律は、障壁を減らし、実際の収益の成長を促進することを目指している。", "letter": "A"}, {"id": 15, "term": "Agricultural Confidence", "translation": "農業の信頼感", "example": "A decline in agricultural confidence often signals an impending economic downturn or recession.", "exampleJa": "農業の信頼感の低下は、しばしば差し迫った景気後退や不況の兆候となる。", "letter": "A"}, {"id": 16, "term": "Agricultural Cost", "translation": "農業のコスト", "example": "The company's board of directors met to discuss the strategic optimization of their agricultural cost.", "exampleJa": "会社の取締役会は、彼らの農業のコストの戦略的最適化について話し合うために集まった。", "letter": "A"}, {"id": 17, "term": "Agricultural Demand", "translation": "農業の需要", "example": "Both supply and demand factors are currently driving the valuation of agricultural demand.", "exampleJa": "現在、需要と供給の両方の要因が農業の需要の評価を動かしている。", "letter": "A"}, {"id": 18, "term": "Agricultural Employment", "translation": "農業の雇用", "example": "The unexpected geopolitical event caused immediate volatility in the global agricultural employment.", "exampleJa": "予期せぬ地政学的イベントは、世界の農業の雇用に即座にボラティリティをもたらした。", "letter": "A"}, {"id": 19, "term": "Agricultural Output", "translation": "農業の生産高", "example": "Policymakers are under pressure to resolve the ongoing crisis surrounding agricultural output.", "exampleJa": "政策立案者は、農業の生産高をめぐる現在進行中の危機を解決するよう圧力を受けている。", "letter": "A"}, {"id": 20, "term": "Agricultural Price", "translation": "農業の価格", "example": "The academic paper provides a theoretical framework for analyzing agricultural price dynamics.", "exampleJa": "その学術論文は、農業の価格のダイナミクスを分析するための理論的枠組みを提供している。", "letter": "A"}, {"id": 21, "term": "Agricultural Production", "translation": "農業の生産", "example": "The country's agricultural production has shown significant improvement over the past fiscal year.", "exampleJa": "その国の農業の生産は、前会計年度において大幅な改善を示した。", "letter": "A"}, {"id": 22, "term": "Agricultural Sector", "translation": "農業のセクター", "example": "Analysts are closely monitoring the fluctuations in agricultural sector amid global economic uncertainty.", "exampleJa": "世界経済の不確実性の中で、アナリストは農業のセクターの変動を注意深く監視している。", "letter": "A"}, {"id": 23, "term": "Agricultural Spending", "translation": "農業の支出", "example": "The government announced a new strategy to address the challenges related to agricultural spending.", "exampleJa": "政府は、農業の支出に関連する課題に対処するための新しい戦略を発表した。", "letter": "A"}, {"id": 24, "term": "Agricultural Supply", "translation": "農業の供給", "example": "The central bank decided to adjust its policies to stabilize the nationwide agricultural supply.", "exampleJa": "中央銀行は、全国的な農業の供給を安定させるために政策を調整することを決定した。", "letter": "A"}, {"id": 25, "term": "Agricultural Unemployment", "translation": "農業の失業", "example": "Changes in agricultural unemployment can have a direct and profound impact on consumer confidence.", "exampleJa": "農業の失業の変化は、消費者マインドに直接的かつ深刻な影響を与える可能性がある。", "letter": "A"}, {"id": 26, "term": "Agricultural Wage", "translation": "農業の賃金", "example": "The corporate financial statement highlighted an unexpected variance in their agricultural wage.", "exampleJa": "企業の財務諸表は、彼らの農業の賃金における予期せぬ変動を強調した。", "letter": "A"}, {"id": 27, "term": "Annual Asset", "translation": "年間資産", "example": "International trade negotiations often focus heavily on regulations governing annual asset.", "exampleJa": "国際貿易交渉では、しばしば年間資産を管理する規制に大きな焦点が当てられる。", "letter": "A"}, {"id": 28, "term": "Annual Budget", "translation": "年間予算", "example": "The multinational firm seeks to mitigate risks by diversifying its annual budget.", "exampleJa": "その多国籍企業は、年間予算を多様化することでリスクを軽減しようとしている。", "letter": "A"}, {"id": 29, "term": "Annual Cash Flow", "translation": "年間キャッシュフロー", "example": "A sudden rise in annual cash flow could lead to tighter credit conditions across the market.", "exampleJa": "年間キャッシュフローの急激な上昇は、市場全体の信用状況の引き締めにつながる可能性がある。", "letter": "A"}, {"id": 30, "term": "Annual Earnings", "translation": "年間利益", "example": "The economic research institute published a comprehensive report on the trends of annual earnings.", "exampleJa": "その経済研究所は、年間利益の動向に関する包括的な報告書を発行した。", "letter": "A"}, {"id": 31, "term": "Annual Equity", "translation": "年間自己資本", "example": "Many emerging markets are experiencing rapid shifts in their annual equity structures.", "exampleJa": "多くの新興国市場は、その年間自己資本構造において急速な変化を経験している。", "letter": "A"}, {"id": 32, "term": "Annual Expenditure", "translation": "年間支出", "example": "The CFO emphasized that maintaining a healthy annual expenditure is vital for long-term sustainability.", "exampleJa": "CFOは、長期的な持続可能性のために健全な年間支出を維持することが不可欠であると強調した。", "letter": "A"}, {"id": 33, "term": "Annual Income", "translation": "年間所得", "example": "Experts debate whether the current level of annual income is sustainable in the long run.", "exampleJa": "専門家は、現在の年間所得の水準が長期的に維持可能かどうかについて議論している。"       selectedIndex = Math.max(0, Math.min(index, filtered.length - 1));
      const entry = filtered[selectedIndex];
      term.textContent = entry.term;
      translation.textContent = entry.translation;
      example.textContent = entry.example;
      exampleJa.textContent = entry.exampleJa;
      position.textContent = `${selectedIndex + 1} / ${filtered.length}`;
      [...list.children].forEach((child, i) => child.classList.toggle("active", i === selectedIndex));
      list.children[selectedIndex]?.scrollIntoView({ block: "nearest" });
    }

    function drawList() {
      list.innerHTML = "";
      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "該当する単語がありません。";
        list.appendChild(empty);
        return;
      }
      filtered.forEach((entry, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "item";
        button.innerHTML = `<span class="term">${htmlEscape(entry.term)}</span><span class="translation">${htmlEscape(entry.translation)}</span>`;
        button.addEventListener("click", () => selectEntry(index));
        list.appendChild(button);
      });
    }

    function htmlEscape(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function applyFilter() {
      const query = norm(search.value).trim();
      filtered = entries.filter((entry) => {
        const letterOk = currentLetter === "All" || entry.letter === currentLetter;
        const haystack = norm(`${entry.term} ${entry.translation} ${entry.example} ${entry.exampleJa}`);
        return letterOk && (!query || haystack.includes(query));
      });
      count.textContent = `${filtered.length} / ${entries.length} words`;
      drawLetters();
      drawList();
      selectEntry(Math.min(selectedIndex, filtered.length - 1));
    }

    search.addEventListener("input", () => {
      selectedIndex = 0;
      applyFilter();
    });
    prev.addEventListener("click", () => selectEntry(selectedIndex - 1));
    next.addEventListener("click", () => selectEntry(selectedIndex + 1));
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowUp") selectEntry(selectedIndex - 1);
      if (event.key === "ArrowDown") selectEntry(selectedIndex + 1);
    });

    applyFilter();
    search.focus();
  </script>
</body>
</html>
